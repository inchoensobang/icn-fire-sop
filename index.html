<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인천소방 현장지원시스템</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🚒 인천소방 현장지원시스템</div>
    <div class="sub">ICN Fire Assist · SOP Viewer</div>
  </header>

  <main class="container">
    <section id="homeView" class="panel">
      <div class="searchBox">
        <input id="searchInput" type="search" placeholder="SOP 번호 또는 제목 검색 예: 208, 호스, 차량, 특수현상" autocomplete="off" />
      </div>

      <div class="tabs">
        <button class="tab active" onclick="setCategory('fire', this)">🔥 화재</button>
        <button class="tab disabled">🚒 구조 준비중</button>
        <button class="tab disabled">🚑 구급 준비중</button>
        <button class="tab" onclick="openFullPdf()">📘 전체 SOP</button>
      </div>

      <div class="summary">
        <strong>화재대응 SOP 200~243</strong>
        <span id="resultCount"></span>
      </div>

      <div id="recentBox" class="recent hidden">
        <div class="miniTitle">🕓 최근 본 SOP</div>
        <div id="recentList" class="recentList"></div>
      </div>

      <div id="sopList" class="sopList"></div>
    </section>

    <section id="viewerView" class="panel viewer hidden">
      <div class="viewerHeader">
        <div>
          <div id="viewerNo" class="viewerNo"></div>
          <h1 id="viewerTitle"></h1>
        </div>
        <button class="outline" onclick="backHome()">← 목록</button>
      </div>

      <div class="viewerActions">
        <button onclick="prevSop()">이전 SOP</button>
        <button onclick="prevPage()">◀ 이전</button>
        <span id="pageInfo" class="pageInfo">1</span>
        <button onclick="nextPage()">다음 ▶</button>
        <button onclick="nextSop()">다음 SOP</button>
      </div>

      <div id="status" class="status"></div>

      <div class="imageFrame">
        <img id="sopImage" alt="SOP 이미지" />
      </div>

      <div class="viewerActions bottom">
        <button onclick="openCurrentImage()">🔍 크게 보기</button>
        <button onclick="openFullPdf()">📘 전체 SOP 원본</button>
      </div>

      <div class="hint">휴대폰: 좌우로 밀어서 페이지 이동 · PC: ← → 방향키 · ESC 목록</div>
    </section>
  </main>

  <footer>인천소방 현장지원시스템 Ver 2.0</footer>

  <script src="sopData.js"></script>
  <script src="script.js"></script>
</body>
</html>
